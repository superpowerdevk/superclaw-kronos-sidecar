services:
  - type: web
    name: superclaw-kronos-sidecar
    runtime: docker
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: KRONOS_MODEL
        value: NeoQuasar/Kronos-small
      - key: HORIZON_SHORT
        value: "4"
      - key: HORIZON_LONG
        value: "24"
      - key: SAMPLE_COUNT
        value: "20"
      - key: REFRESH_TTL
        value: "600"
